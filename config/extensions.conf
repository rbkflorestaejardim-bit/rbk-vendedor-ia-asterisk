[general]
static=yes
writeprotect=yes
autofallthrough=yes
clearglobalvars=no

[globals]
GATEWAY_VOZ=rbk-vendedor-ia_gateway-voz:9019

[ramais]
; Eco local no Asterisk.
exten => 600,1,NoOp(Teste de eco local RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Echo()
 same => n,Hangup()

; Teste simples.
exten => 601,1,NoOp(Teste simples RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Wait(1)
 same => n,Hangup()

; Eco pelo gateway-voz.
exten => 602,1,NoOp(Teste AudioSocket RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Set(AUDIOSOCKET_UUID=11111111-1111-4111-8111-111111111111)
 same => n,AudioSocket(${AUDIOSOCKET_UUID},${GATEWAY_VOZ})
 same => n,Hangup()

; Captura uma frase e envia para o Whisper da Groq.
; Os bips inicial e final são enviados pelo próprio gateway.
exten => 603,1,NoOp(Teste STT Groq RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(AUDIOSOCKET_UUID=22222222-2222-4222-8222-222222222222)
 same => n,AudioSocket(${AUDIOSOCKET_UUID},${GATEWAY_VOZ})
 same => n,Hangup()
