[globals]

[ramais]
; Ligue para 600 no Linphone. Após o bip, sua própria voz será devolvida.
exten => 600,1,NoOp(Teste de eco RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Echo()
 same => n,Hangup()

; Teste simples de conectividade: atende, emite um bip e encerra.
exten => 601,1,NoOp(Teste simples RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Wait(1)
 same => n,Hangup()
