[general]
static=yes
writeprotect=yes
autofallthrough=yes
clearglobalvars=no

[globals]
GATEWAY_VOZ=rbk-vendedor-ia_gateway-voz:9019

[ramais]
; Ligue para 600 no Linphone. Após o bip, sua própria voz será devolvida
; diretamente pelo aplicativo Echo() do Asterisk.
exten => 600,1,NoOp(Teste de eco local RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Echo()
 same => n,Hangup()

; Teste simples de conectividade: atende, emite um bip e encerra.
exten => 601,1,NoOp(Teste simples RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Wait(1)
 same => n,Hangup()

; Teste de eco passando pelo serviço gateway-voz via AudioSocket.
exten => 602,1,NoOp(Teste AudioSocket RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Set(AUDIOSOCKET_UUID=${UUID()})
 same => n,NoOp(AudioSocket UUID: ${AUDIOSOCKET_UUID})
 same => n,AudioSocket(${AUDIOSOCKET_UUID},${GATEWAY_VOZ})
 same => n,Hangup()
