[general]
static=yes
writeprotect=yes
autofallthrough=yes
clearglobalvars=no

[globals]
GATEWAY_VOZ=rbk-vendedor-ia_gateway-voz:9019

[ramais]
; Teste de eco local no próprio Asterisk.
exten => 600,1,NoOp(Teste de eco local RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Echo()
 same => n,Hangup()

; Teste simples de sinalização e áudio.
exten => 601,1,NoOp(Teste simples RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Wait(1)
 same => n,Hangup()

; Teste de eco passando pelo gateway-voz via AudioSocket.
; UUID fixo válido somente para o piloto com uma chamada simultânea.
exten => 602,1,NoOp(Teste AudioSocket RBK)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Set(AUDIOSOCKET_UUID=11111111-1111-4111-8111-111111111111)
 same => n,NoOp(AudioSocket UUID: ${AUDIOSOCKET_UUID})
 same => n,AudioSocket(${AUDIOSOCKET_UUID},${GATEWAY_VOZ})
 same => n,Hangup()
